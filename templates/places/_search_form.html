<form action="{% url 'places:search_results' %}"
      method="get"
      class="flex items-center">
  <div class="relative">
    <input type="text"
           name="q"
           value="{{ request.GET.q|default:'' }}"
           placeholder="Search..."
           class="bg-green-700 text-white placeholder-green-200 px-3 py-2 pr-10 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-green-400 w-40 lg:w-56 transition-all duration-200">
    <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-green-200 text-sm pointer-events-none"></i>
  </div>
</form>
